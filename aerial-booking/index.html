<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>空中律動・預約系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --mb1:#e5edf3;--mb2:#c8d8e4;--mb3:#a4bccc;--mb4:#7a9db5;
  --mb5:#5c7f97;--mb6:#456478;--mb7:#334d5e;--mb8:#213040;
  --sage:#8fa89a;--sl:#eaf2ee;--sand:#b9a880;
  --t1:#213040;--t3:#7a9db5;--tm:#a4bccc;
  --bg:#f4f7f9;--sur:#fff;--brd:#dde8f0;
}
body{font-family:"Noto Sans TC",sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:12px 16px}
.dbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding-bottom:12px}
.vbtn{padding:6px 14px;border-radius:20px;border:1px solid var(--mb3);background:var(--sur);color:var(--mb5);font-size:12px;cursor:pointer;font-family:inherit}
.vbtn.on{background:var(--mb6);color:#fff;border-color:var(--mb6)}
.vbtn:hover:not(.on){background:var(--mb1)}
.dbanner{background:var(--mb7);color:rgba(255,255,255,.6);font-size:11px;padding:5px 14px;border-radius:20px;margin-left:auto}
.app{display:flex;flex-direction:column;min-height:100vh;background:var(--bg)}
@media(min-width:600px){.app{border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(33,48,64,.12);min-height:600px}}
.topbar{background:var(--mb8);padding:12px 16px;display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0}
.tb-name{font-size:15px;color:#fff;font-weight:500;margin-top:2px}
.tb-brand{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.1em}
.tb-roles{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
.tb-rc{font-size:10px;padding:1px 7px;border-radius:10px;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.55)}
.sw{flex-shrink:0;padding:6px 12px;border-radius:16px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.7);font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap}
.sw:hover{background:rgba(255,255,255,.1)}
.rsbar{background:var(--mb7);padding:7px 16px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0}
.rsbar::-webkit-scrollbar{display:none}
.rsbtn{padding:5px 13px;border-radius:14px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.5);font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.rsbtn.on{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.35)}
.tabbar{background:var(--mb7);display:flex;border-bottom:1px solid rgba(255,255,255,.08);padding:0 16px;overflow-x:auto;flex-shrink:0}
.tabbar::-webkit-scrollbar{display:none}
.tab{padding:10px 12px;font-size:13px;color:rgba(255,255,255,.4);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:rgba(255,255,255,.92);border-bottom-color:rgba(255,255,255,.6)}
.tab:hover:not(.on){color:rgba(255,255,255,.7)}
.content{padding:14px;display:flex;flex-direction:column;gap:12px;flex:1;overflow-y:auto}
@media(min-width:600px){.content{padding:18px;gap:14px}}
.cal-wrap{background:var(--sur);border-radius:12px;border:.5px solid var(--brd);overflow:hidden}
.cal-hd{background:var(--mb7);padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.cal-mon{font-size:14px;font-weight:500;color:#fff}
.cnav{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.7);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.cnav:hover{background:rgba(255,255,255,.15)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:8px}
.cal-wd{text-align:center;font-size:10px;font-weight:500;color:var(--t3);padding:4px 0}
.cal-day{display:flex;flex-direction:column;align-items:center;padding:3px 1px;cursor:pointer;border-radius:6px;min-height:36px}
.cal-day:hover:not(.empty){background:var(--mb1)}
.cal-day.empty{cursor:default}
.cal-dn{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--t1)}
.cal-day.today .cal-dn{background:var(--mb1);color:var(--mb6);font-weight:500;box-shadow:0 0 0 1.5px var(--mb3)}
.cal-day.sel .cal-dn{background:var(--mb6);color:#fff;font-weight:500}
.cdot-row{height:4px;display:flex;align-items:center;justify-content:center;margin-top:2px}
.cdot{width:3px;height:3px;border-radius:50%;background:var(--mb3)}
.cc{background:var(--sur);border-radius:10px;border:.5px solid var(--brd);overflow:hidden;display:flex;flex-direction:column}
.cc-main{display:flex}
.cc-bar{width:4px;flex-shrink:0}
.cc-body{flex:1;padding:10px 12px;display:flex;align-items:center;gap:10px;min-width:0}
.cc-icon{width:36px;height:36px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.cc-info{flex:1;min-width:0}
.cc-name{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:2px}
.cc-tline{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--t3);margin-bottom:3px}
.cc-tdot{width:12px;height:12px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;color:#fff;flex-shrink:0}
.cc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cc-time{font-size:11px;color:var(--t3);background:var(--bg);padding:2px 6px;border-radius:5px;border:.5px solid var(--brd)}
.cap{height:3px;background:var(--brd);border-radius:2px;overflow:hidden;width:48px}
.cap-f{height:100%;border-radius:2px;background:var(--mb4)}
.cc-spots{font-size:11px;color:var(--t3)}
.cc-right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:5px;padding-right:2px}
.cc-exp{border-top:.5px solid var(--brd);padding:10px 12px 12px;display:none}
.cc-exp.open{display:block}
.exp-row{background:var(--sur);border-radius:10px;border:.5px solid var(--brd);overflow:hidden}
.exp-hd{padding:11px 14px;display:flex;align-items:center;cursor:pointer;user-select:none}
.exp-bar{width:4px;align-self:stretch;flex-shrink:0;margin-right:11px;border-radius:2px}
.exp-inf{flex:1;min-width:0}
.exp-title{font-size:13px;font-weight:500;color:var(--t1)}
.exp-sub{font-size:11px;color:var(--t3);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.exp-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:6px}
.exp-cnt{font-size:11px;color:var(--mb5);background:var(--mb1);padding:2px 8px;border-radius:12px;white-space:nowrap}
.exp-chev{font-size:11px;color:var(--tm);transition:transform .2s;display:inline-block}
.exp-body{border-top:.5px solid var(--brd);padding:10px 14px 12px;display:none}
.exp-body.open{display:block}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg);border-radius:20px;padding:3px 9px;font-size:11px;color:var(--t1);border:.5px solid var(--brd)}
.chip-av{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;color:#fff;flex-shrink:0}
.wl-sec{margin-top:8px;padding-top:8px;border-top:1px dashed var(--brd)}
.wl-lbl{font-size:10px;color:var(--t3);letter-spacing:.05em;margin-bottom:5px}
.sp{font-size:11px;font-weight:500;padding:2px 7px;border-radius:5px;white-space:nowrap}
.sp-open{background:var(--mb1);color:var(--mb5)}.sp-booked{background:var(--mb1);color:var(--mb6)}
.sp-wait{background:var(--sl);color:#3a6b50}.sp-full{background:var(--bg);color:var(--tm)}
.sp-paid{background:#eaf5ea;color:#3a7a3a}.sp-stop{background:#f5f0ee;color:#a07060}
.sp-pend{background:#fff8e0;color:#8a6000}.sp-chg{background:#ffe8e8;color:#8a2020}
.sp-rf{background:#f0e8ff;color:#6040a0}
.btn{padding:6px 11px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;white-space:nowrap}
.btn-p{background:var(--mb6);color:#fff}.btn-p:hover{background:var(--mb7)}
.btn-c{background:var(--bg);color:var(--t3);border:.5px solid var(--brd)}.btn-c:hover:not(:disabled){border-color:var(--mb3);color:var(--mb5)}.btn-c:disabled{opacity:.4;cursor:not-allowed}
.btn-w{background:var(--sl);color:#3a6b50}.btn-w:hover{background:#d5ebe0}
.btn-rf{background:#f0e8ff;color:#6040a0;border:.5px solid #d0c0f0}.btn-rf:hover{background:#e0d0ff}
.act{padding:4px 9px;border-radius:6px;border:.5px solid var(--brd);background:var(--sur);font-size:11px;cursor:pointer;font-family:inherit;color:var(--t3)}
.act:hover{border-color:var(--mb3);color:var(--mb5)}
.act-ok{background:var(--mb5);border-color:var(--mb5);color:#fff}.act-ok:hover{background:var(--mb6)!important;color:#fff!important}
.act-gr{background:#3a7a3a;border-color:#3a7a3a;color:#fff}.act-gr:hover{background:#2d622d!important;color:#fff!important}
.act-del{color:#c44}.act-del:hover{border-color:#c44!important;background:#fff5f5!important;color:#c44!important}
.big-btn{width:100%;padding:13px;border-radius:10px;border:none;background:var(--mb5);color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.big-btn:hover{background:var(--mb6)}.big-btn:disabled{background:var(--mb2);color:var(--mb6);cursor:not-allowed}
.bh{background:var(--mb7);border-radius:12px;padding:16px 18px;color:#fff}
.bh-amt{font-size:30px;font-weight:300;line-height:1}
.bh-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:4px}
.bill-row{background:var(--sur);border-radius:8px;border:.5px solid var(--brd);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.br-type{font-size:13px;font-weight:500;color:var(--t1)}.br-date{font-size:11px;color:var(--t3);margin-top:2px}
.br-amt{font-size:14px;font-weight:500;color:var(--mb6)}.br-amt.disc{color:var(--sage)}
.disc-note{font-size:10px;color:var(--sage);margin-top:2px}
.pay-card{background:var(--sur);border-radius:12px;border:.5px solid var(--brd);overflow:hidden}
.pay-hd{background:var(--mb1);padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:.5px solid var(--mb2)}
.pay-hdt{font-size:13px;font-weight:500;color:var(--mb7)}
.pay-body{padding:14px;display:flex;flex-direction:column;gap:11px}
.pay-ar{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-radius:8px;padding:10px 12px}
.pa-lbl{font-size:12px;color:var(--t3)}.pa-amt{font-size:18px;font-weight:500;color:var(--mb6)}
.pay-br{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px}
.pay-acc{font-size:16px;font-weight:500;color:var(--mb7);letter-spacing:.06em}
.copy-btn{padding:6px 12px;border-radius:7px;border:1px solid var(--mb3);background:var(--sur);color:var(--mb6);font-size:12px;cursor:pointer;font-family:inherit}
.copy-btn:hover{background:var(--mb1)}.copy-btn.copied{background:var(--sl);border-color:var(--sage);color:#3a6b50}
.pay-div{height:.5px;background:var(--brd)}
.pay-note{font-size:12px;color:var(--mb7);background:var(--bg);border-radius:7px;padding:10px 12px;line-height:1.8}
.banner{border-radius:10px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.banner.green{background:#eaf5ea;border:.5px solid #b0d8b0}
.banner.yellow{background:#fff8e8;border:.5px solid #f0d080}
.banner.blue{background:var(--mb1);border:.5px solid var(--mb2)}
.banner.red{background:#ffe8e8;border:.5px solid #f0a0a0}
.banner.purple{background:#f4eeff;border:.5px solid #d0b8f8}
.bicon{font-size:18px;flex-shrink:0;margin-top:1px}
.btitle{font-size:13px;font-weight:500}
.bsub{font-size:11px;margin-top:3px;line-height:1.6}
.banner.green .btitle{color:#2a6a2a}.banner.green .bsub{color:#4a8a4a}
.banner.yellow .btitle{color:#7a5000}.banner.yellow .bsub{color:#a07820}
.banner.blue .btitle{color:var(--mb7)}.banner.blue .bsub{color:var(--t3)}
.banner.red .btitle{color:#8a2020}.banner.red .bsub{color:#aa3030}
.banner.purple .btitle{color:#5030a0}.banner.purple .bsub{color:#7050c0}
.ss{background:var(--sur);border-radius:12px;border:.5px solid var(--brd);overflow:hidden}
.s-hd{background:var(--mb1);padding:10px 14px;border-bottom:.5px solid var(--mb2);display:flex;align-items:center;gap:8px}
.s-hdt{font-size:13px;font-weight:500;color:var(--mb7)}
.s-body{padding:14px;display:flex;flex-direction:column;gap:12px}
.sg2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
@media(max-width:400px){.sg2{grid-template-columns:1fr}}
.sfg{display:flex;flex-direction:column;gap:4px}
.sfl{font-size:11px;color:var(--t3);font-weight:500;letter-spacing:.04em}
.sfi{padding:9px 11px;border-radius:8px;border:.5px solid var(--brd);background:var(--bg);font-size:13px;color:var(--t1);font-family:inherit;outline:none;width:100%}
.sfi:focus{border-color:var(--mb4);background:var(--sur)}
.sfh{font-size:10px;color:var(--tm);line-height:1.5}
.save-bar{display:flex;align-items:center;justify-content:flex-end;gap:10px}
.save-st{font-size:12px;color:var(--sage);opacity:0}.save-st.show{opacity:1}
.btn-save{padding:9px 20px;border-radius:8px;border:none;background:var(--mb5);color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-save:hover{background:var(--mb6)}
.btn-sec{padding:9px 14px;border-radius:8px;border:1px solid var(--mb3);background:var(--sur);color:var(--mb6);font-size:13px;cursor:pointer;font-family:inherit}
.ct-card{background:var(--bg);border-radius:10px;border:.5px solid var(--brd);padding:12px 14px;display:flex;align-items:center;gap:10px}
.ct-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.ct-name{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:3px}
.ct-meta{font-size:11px;color:var(--t3);display:flex;gap:7px;flex-wrap:wrap}
.btn-dash{padding:10px 18px;border-radius:8px;border:1px dashed var(--mb3);background:transparent;color:var(--mb5);font-size:13px;cursor:pointer;font-family:inherit;width:100%}
.btn-dash:hover{background:var(--mb1)}
.tblw{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;border:.5px solid var(--brd)}
.at{width:100%;border-collapse:collapse;background:var(--sur)}
.at th{padding:8px 10px;text-align:left;font-size:11px;font-weight:500;letter-spacing:.06em;color:var(--t3);background:var(--bg);border-bottom:.5px solid var(--brd);white-space:nowrap}
.at td{padding:10px 10px;border-bottom:.5px solid var(--brd);font-size:12px;color:var(--t1);vertical-align:middle}
.at tr:last-child td{border-bottom:none}
.at tbody tr:hover{background:var(--bg)}
.rdisp{display:flex;gap:3px;flex-wrap:wrap}
.rc{font-size:10px;font-weight:500;padding:1px 7px;border-radius:10px;white-space:nowrap}
.rc.student{background:var(--sl);color:#3a6b50}.rc.teacher{background:var(--mb1);color:var(--mb6)}.rc.admin{background:#f0ede8;color:#7a6050}
.toolbar{background:var(--sur);border-radius:10px;border:.5px solid var(--brd);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.mv-wrap{display:flex;align-items:center;gap:6px}
.mv-btn{width:28px;height:28px;border-radius:50%;border:.5px solid var(--brd);background:var(--sur);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--t3)}
.mv-btn:hover{border-color:var(--mb3);color:var(--mb5)}
.mv-lbl{font-size:13px;font-weight:500;color:var(--t1);min-width:80px;text-align:center}
.tool-acts{display:flex;gap:6px;flex-wrap:wrap}
.btn-add{padding:7px 14px;border-radius:8px;border:none;background:var(--mb5);color:#fff;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-add:hover{background:var(--mb6)}
.btn-copy{padding:7px 12px;border-radius:8px;border:1px solid var(--mb3);background:var(--sur);color:var(--mb6);font-size:12px;cursor:pointer;font-family:inherit}
.btn-copy:hover{background:var(--mb1)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.modal-bg{align-items:center;padding:20px}}
.modal-box{background:var(--sur);border-radius:16px 16px 0 0;width:100%;max-width:520px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden}
@media(min-width:600px){.modal-box{border-radius:14px;max-height:88vh}}
.modal-hd{background:var(--mb8);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-hdt{font-size:14px;font-weight:500;color:#fff}
.modal-x{width:26px;height:26px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.6);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-x:hover{background:rgba(255,255,255,.15)}
.modal-body{padding:16px;display:flex;flex-direction:column;gap:13px;overflow-y:auto;flex:1}
.mg2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
@media(max-width:400px){.mg2{grid-template-columns:1fr}}
.mf{display:flex;flex-direction:column;gap:4px}
.ml{font-size:11px;color:var(--t3);font-weight:500;letter-spacing:.04em}
.mi,.ms{padding:9px 11px;border-radius:8px;border:.5px solid var(--brd);background:var(--bg);font-size:13px;color:var(--t1);font-family:inherit;outline:none;width:100%}
.mi:focus,.ms:focus{border-color:var(--mb4);background:var(--sur)}
.mhint{font-size:10px;color:var(--tm);margin-top:2px;line-height:1.5}
.modal-ft{padding:12px 16px;background:var(--bg);border-top:.5px solid var(--brd);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.m-cancel{padding:9px 16px;border-radius:8px;border:.5px solid var(--brd);background:var(--sur);font-size:13px;cursor:pointer;font-family:inherit;color:var(--t3)}
.m-cancel:hover{border-color:var(--mb3);color:var(--mb5)}
.m-ok{padding:9px 20px;border-radius:8px;border:none;background:var(--mb5);color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.m-ok:hover{background:var(--mb6)}
.t-opt{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;border:.5px solid var(--brd);cursor:pointer;background:var(--bg)}
.t-opt:hover{border-color:var(--mb3);background:var(--mb1)}
.t-opt.sel{border-color:var(--mb5);background:var(--mb1)}
.t-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0;font-weight:500}
.t-name{font-size:13px;color:var(--t1);flex:1;font-weight:500}
.t-rls{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.t-rc{font-size:10px;padding:1px 5px;border-radius:10px}
.trc-t{background:var(--mb1);color:var(--mb6)}.trc-a{background:#f0ede8;color:#7a6050}.trc-s{background:var(--sl);color:#3a6b50}
.t-chk{margin-left:auto;width:18px;height:18px;border-radius:50%;background:var(--mb5);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;opacity:0;flex-shrink:0}
.t-opt.sel .t-chk{opacity:1}
.cprev{background:var(--bg);border-radius:8px;padding:11px 13px;border:.5px solid var(--mb2)}
.cprev-t{font-size:10px;color:var(--mb6);font-weight:500;margin-bottom:7px;letter-spacing:.06em}
.cprev-r{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t1);padding:3px 0}

function buildMonth(y,m){
  const r=[],days=new Date(y,m,0).getDate();
  for(let d=1;d<=days;d++){
    const dt=new Date(y,m-1,d);
    TMPL.forEach(t=>{
      if(t.weekday===dt.getDay()){
        const ct=courseTypes.find(x=>x.name===t.type)||courseTypes[0];
        r.push({id:"s-"+y+"-"+m+"-"+d+"-"+t.type+"-"+t.time,
          date:y+"-"+String(m).padStart(2,"0")+"-"+String(d).padStart(2,"0"),
          time:t.time,type:t.type,teacherId:"t1",
          max:ct?ct.maxPeople:8,min:MIN,cancelHours:null,status:"open",src:"tpl"});
      }
    });
  }
  return r.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
}

// ═══ PAYMENTS
const getPayment=(uid,mv)=>payments.slice().reverse().find(p=>p.uid===uid&&p.month===(mv||monthView));
function paymentStatus(uid,mv){
  const p=getPayment(uid,mv||monthView);if(!p)return "none";
  const{total}=computeBilling(uid,mv||monthView);
  if(p.status==="confirmed")return p.paidAmount===total?"confirmed":"changed";
  if(p.status==="pending")return "pending";
  return "none";
}
function notifyPayment(uid,mv){
  const mv2=mv||monthView,{total}=computeBilling(uid,mv2);
  const i=payments.findIndex(p=>p.uid===uid&&p.month===mv2);
  if(i>-1)payments.splice(i,1);
  payments.push({uid,month:mv2,paidAmount:total,status:"pending"});render();
}
function confirmPayment(uid,mv){
  const mv2=mv||monthView,{total}=computeBilling(uid,mv2);
  const i=payments.findIndex(p=>p.uid===uid&&p.month===mv2);
  if(i>-1)payments[i]={uid,month:mv2,paidAmount:total,status:"confirmed"};
  else payments.push({uid,month:mv2,paidAmount:total,status:"confirmed"});
  render();
}

// ═══ BILLING
function computeBilling(uid,mv){
  const tgt=mv||monthView;
  const active=bookings.filter(b=>b.uid===uid&&b.status==="booked");
  const smap=Object.fromEntries(schedules.filter(s=>s.status==="open"&&s.date.startsWith(tgt)).map(s=>[s.id,s]));
  const byDay={};
  active.forEach(b=>{const s=smap[b.sid];if(!s)return;if(!byDay[s.date])byDay[s.date]=[];byDay[s.date].push({b,s});});
  const rows=[];
  Object.values(byDay).forEach(items=>{
    const tp=new Set(items.map(i=>i.s.type));
    items.forEach(item=>{
      const ct=getCTByName(item.s.type);
      let amt=ct?ct.price:450,disc=false,origAmt=amt;
      if(ct&&ct.comboPrice!=null&&ct.comboWith){
        const p2=getCTById(ct.comboWith);
        if(p2&&tp.has(p2.name)){amt=ct.comboPrice;disc=true;origAmt=ct.price;}
      }
      rows.push({date:item.s.date,time:item.s.time,type:item.s.type,amt,disc,origAmt,sid:item.s.id});
    });
  });
  rows.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  return{rows,total:rows.reduce((s,r)=>s+r.amt,0)};
}

function doCopyLastWeek(){
  // 找目前月份，把整個月有課的每一天，往後+7天複製一份（跨月也可）
  const fmt=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  // 根據目前月份檢視，找出「上個月或本月」有課的日期，複製到+7天
  const p=monthView.split("-").map(Number);
  // 取本月所有課 + 上個月最後一週的課
  const allSrc=schedules.filter(s=>s.status!=="stopped");
  let added=0;
  // 找出本月每一天，看+7天有沒有對應課
  const days=new Date(p[0],p[1],0).getDate();
  for(let d=1;d<=days;d++){
    const srcDate=p[0]+"-"+String(p[1]).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    const daySch=allSrc.filter(s=>s.date===srcDate);
    if(!daySch.length)continue;
    daySch.forEach(s=>{
      const old=new Date(s.date+"T00:00:00");
      const nDate=new Date(old);nDate.setDate(nDate.getDate()+7);
      const nd=fmt(nDate);
      if(!schedules.some(x=>x.date===nd&&x.time===s.time&&x.type===s.type)){
        schedules.push({id:"s-"+nd.replace(/-/g,"")+s.type.replace(/\s/g,"")+s.time.replace(/:/g,""),
          date:nd,time:s.time,type:s.type,teacherId:s.teacherId,
          max:s.max,min:s.min,cancelHours:s.cancelHours,status:"open",src:"copy"});
        added++;
      }
    });
  }
  alert(added>0?"已複製 "+added+" 堂（每堂往後推7天）":monthView+" 的課程已全部複製過");render();
}
function doCopyLastMonth(){
  const p=monthView.split("-").map(Number);let py=p[0],pm=p[1]-1;if(pm<1){pm=12;py--;}
  const pk=py+"-"+String(pm).padStart(2,"0");
  const prev=schedules.filter(s=>s.date.startsWith(pk));
  if(!prev.length){alert("上個月沒有課程可複製");return;}
  let added=0;const days=new Date(p[0],p[1],0).getDate();
  prev.forEach(s=>{
    const wd=new Date(s.date+"T00:00:00").getDay();
    for(let d=1;d<=days;d++){
      if(new Date(p[0],p[1]-1,d).getDay()===wd){
        const nd=p[0]+"-"+String(p[1]).padStart(2,"0")+"-"+String(d).padStart(2,"0");
        if(!schedules.some(x=>x.date===nd&&x.time===s.time&&x.type===s.type)){
          schedules.push({id:"s-"+p[0]+"-"+p[1]+"-"+d+"-"+s.type+"-"+s.time,
            date:nd,time:s.time,type:s.type,teacherId:s.teacherId||"t1",
            max:s.max,min:s.min,cancelHours:s.cancelHours,status:"open",src:"copy"});added++;
        }
      }
    }
  });
  alert(added>0?"已複製 "+added+" 堂到 "+monthView:monthView+" 已有相同課程");render();
}

// ═══ CALENDAR
function renderCal(year,month,selD,onClickFn,prevFn,nextFn){
  const ym=year+"-"+String(month).padStart(2,"0");
  const first=new Date(year,month-1,1).getDay(),days=new Date(year,month,0).getDate();
  const todayStr=NOW.toISOString().slice(0,10);
  const dotMap={};schedules.filter(s=>s.date.startsWith(ym)).forEach(s=>{dotMap[s.date]=true;});
  let cells="";
  for(let i=0;i<first;i++)cells+='<div class="cal-day empty"></div>';
  for(let d=1;d<=days;d++){
    const ds=year+"-"+String(month).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    let cls="cal-day";if(ds===todayStr)cls+=" today";if(ds===selD)cls+=" sel";
    const hk=_h(()=>{ if(onClickFn==="setSelDate")setSelDate(ds);
                       else if(onClickFn==="setTeacherSelDate")setTeacherSelDate(ds);
                       else if(onClickFn==="setAdminSelDate")setAdminSelDate(ds); });
    cells+='<div class="'+cls+'" onclick="_H.'+hk+'()"><div class="cal-dn">'+d+'</div>'
      +'<div class="cdot-row">'+(dotMap[ds]?'<div class="cdot"></div>':"")+'</div></div>';
  }
  const pk=_h(prevFn),nk=_h(nextFn);
  return '<div class="cal-wrap"><div class="cal-hd">'
    +'<button class="cnav" onclick="_H.'+pk+'()">‹</button>'
    +'<span class="cal-mon">'+fmtYM(year,month)+'</span>'
    +'<button class="cnav" onclick="_H.'+nk+'()">›</button></div>'
    +'<div class="cal-grid">'+"日一二三四五六".split("").map(w=>'<div class="cal-wd">'+w+'</div>').join("")+cells
    +'</div></div>';
}

async function adminRemoveStudent(sid,uid){
  if(!confirm("確定將此學員從課程移除？"))return;
  const i=bookings.findIndex(b=>b.sid===sid&&b.uid===uid&&b.status==="booked");
  if(i>-1){
    const bid=bookings[i].id;
    bookings.splice(i,1);
    try{await fbDelete('bookings',bid);}catch(e){console.error('fbDelete',e);}
  }
  render();
}
function openAddStudent(sid){
  _addSearch="";
  const allAvail=getStudents().filter(u=>!uBooked(sid,u.id)&&!uWait(sid,u.id));
  if(!allAvail.length){showModalInfo("加入學員",'<div class="info-box">所有學員已在名單中</div>');return;}
  const body='<div class="mf"><label class="ml">搜尋學員</label>'
    +'<div class="srch-wrap"><input id="add-srch" type="text" placeholder="輸入姓名…" oninput="_addSearch=this.value;refreshAddList(\''+sid+'\')"><span class="srch-ico">🔍</span></div></div>'
    +'<div class="mf"><label class="ml">選擇學員</label><div id="add-list">'+buildAddList(allAvail,sid)+'</div></div>';
  showModal("加入學員",body,async ()=>{
    const sel=document.getElementById("add-sel");if(!sel||!sel.value){alert("請選擇學員");return;}
    const sc=schedules.find(x=>x.id===sid);
    const bk={id:"b"+(bidN++),sid,uid:sel.value,status:bkdCnt(sid)>=(sc?sc.max:8)?"waitlist":"booked"};
    bookings.push(bk);

    closeModal();render();
  },"加入");
}
function buildAddList(avail,sid){
  const sq=_addSearch.trim().toLowerCase();

  if(!fl.length)return '<div style="padding:10px;font-size:12px;color:var(--t3)">找不到符合的學員</div>';
  return '<select class="ms" id="add-sel" size="'+Math.min(fl.length+1,6)+'" style="border-radius:8px">'+fl.map(u=>'<option value="'+u.id+'">'+u.name+'（'+u.roles.map(r=>RL[r]).join("・")+'）</option>').join("")+'</select>';

function refreshAddList(sid){
  const el=document.getElementById("add-list");if(!el)return;
  const allAvail=getStudents().filter(u=>!uBooked(sid,u.id)&&!uWait(sid,u.id));
  el.innerHTML=buildAddList(allAvail,sid);
}

    courseTypes.push({id:"ct"+(_ctId++),name,price,maxPeople,comboPrice,comboWith:comboWith||null,color:_ctColor,icon});
    closeModal();render();
  },"新增");
}
function openEditCT(id){
  const ct=getCTById(id);if(!ct)return;_editCtId=id;
  showModal("編輯 — "+ct.name,ctBody(ct),()=>{
    const ct2=getCTById(_editCtId);if(!ct2)return;
    const name=document.getElementById("ct-name")?.value.trim();if(!name){alert("請輸入課程名稱");return;}
    const oldName=ct2.name;ct2.name=name;
    ct2.price=Number(document.getElementById("ct-price")?.value)||450;
    ct2.maxPeople=Number(document.getElementById("ct-maxp")?.value)||ct2.maxPeople||8;
    const cpStr=document.getElementById("ct-cprice")?.value.trim();
    ct2.comboPrice=cpStr===""?null:Number(cpStr);
    ct2.comboWith=document.getElementById("ct-cwith")?.value||null;
    ct2.icon=document.getElementById("ct-icon")?.value||ct2.icon;
    ct2.color=_ctColor||ct2.color;
    if(name!==oldName)schedules.forEach(s=>{if(s.type===oldName)s.type=name;});
    closeModal();render();
  },"儲存");
}
function deleteCT(id){
  if(courseTypes.length<=1){alert("至少保留一種課程類型");return;}
  const ct=getCTById(id);if(!ct)return;
  if(!confirm("確定刪除「"+ct.name+"」？"))return;
  courseTypes=courseTypes.filter(t=>t.id!==id);
  courseTypes.forEach(t=>{if(t.comboWith===id)t.comboWith=null;});
  render();
}

// ═══ LOGIN
function renderLogin(){
  const lhk=_h(doLineLogin);
  return '<div class="login-wrap"><div class="login-card">'
    +'<div class="login-icon"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 5.37 2 9.5c0 3.68 3.18 6.73 7.5 7.38V19l3-2c.17 0 .33.01.5.01 5.52 0 10-3.37 10-7.51C23 5.37 18.52 2 12 2z" fill="#5c7f97"/></svg></div>'
    +'<div class="login-title">貝你飛・空中律動</div>'
    +'<div class="login-sub">課程預約系統<br>使用 LINE 帳號登入</div>'
    +'<button class="line-btn" onclick="_H.'+lhk+'()">使用 LINE 登入</button>'
    +'</div></div>';
}

function loginAs(uid){
  currentUserId=uid;const u=users.find(x=>x.id===uid);if(!u)return;
  // Priority: student first (so multi-role users land on student), then teacher, then admin
  if(u.roles.includes("student"))activeRole="student";
  else if(u.roles.includes("teacher"))activeRole="teacher";
  else activeRole="admin";
  V(activeRole);
}
function switchRole(role){activeRole=role;V(role);}

// ═══ MAIN RENDER
function V(view){
  currentView=view;
  document.querySelectorAll(".vbtn").forEach(b=>b.classList.remove("on"));
  const btn=document.getElementById("vbtn-"+view);if(btn)btn.classList.add("on");
  render();
}
// Register desktop nav buttons
_H.vlogin=()=>V("login");
_H.vstudent=()=>V("student");
_H.vteacher=()=>V("teacher");
_H.vadmin=()=>V("admin");

function render(){
  const ta=document.getElementById("topbar-area");
  const ca=document.getElementById("content-area");
  if(!ta||!ca)return;
  if(currentView==="login"){ta.innerHTML="";ca.innerHTML=renderLogin();return;}
  const cu=users.find(u=>u.id===currentUserId);
  const tabMap={
    student:[["cal","月曆課表"],["mine","我的預約"],["billing","費用 & 付款"]],
    teacher:[],
    admin:[["courses","課程管理"],["stats","統計 & 收費"],["settings","系統設定"]]
  };
  const tabs=tabMap[currentView]||[];
  if(!activeTab[currentView]&&tabs.length)activeTab[currentView]=tabs[0][0];
  const roleBadges=cu?cu.roles.map(r=>'<span class="tb-rc">'+RL[r]+'</span>').join(""):"";
  const swhk=_h(()=>V("login"));
  let topHtml='<div class="topbar"><div><div class="tb-brand">空中律動・預約系統</div><div class="tb-name">'+(cu?cu.name:"")+'</div><div class="tb-roles">'+roleBadges+'</div></div>'
    +'<button class="sw" onclick="_H.'+swhk+'()">切換身份</button></div>';
  if(cu&&cu.roles.length>1){
    topHtml+='<div class="rsbar">';
    cu.roles.forEach(r=>{const rhk=_h(()=>switchRole(r));topHtml+='<button class="rsbtn'+(r===activeRole?" on":"")+'" onclick="_H.'+rhk+'()">'+RL[r]+'模式</button>';});
    topHtml+='</div>';
  }
  if(tabs.length){
    topHtml+='<div class="tabbar">'+tabs.map(([id,lbl])=>{
      const tk=_h(()=>{activeTab[currentView]=id;render();});
      return '<span class="tab'+(activeTab[currentView]===id?" on":"")+'" onclick="_H.'+tk+'()">'+lbl+'</span>';
    }).join("")+'</div>';
  }
  ta.innerHTML=topHtml;
  let body="";
  if(currentView==="student"){
    const uid=currentUserId||"u1";const t=activeTab.student;
    body=t==="cal"?pageCalendar(uid):t==="mine"?pageMyBookings(uid):pageBilling(uid);
  }else if(currentView==="teacher"){body=pageTeacher();}
  else{const t=activeTab.admin;body=t==="courses"?pageAdminCourses():t==="stats"?pageAdminStats():pageSettingsFull();}
  ca.innerHTML='<div class="content">'+body+'</div>';
  if(currentView==="admin"&&activeTab.admin==="settings"){
    const ne=document.getElementById("sf-note"),pe=document.getElementById("pnp");
    if(ne&&pe)ne.addEventListener("input",()=>{pe.innerHTML=ne.value.replace(/\n/g,"<br>");});
  }
}

async function init(){
  try{
    if(window.location.search.includes('code=')){
      const ok=await handleLineCallback();
      if(ok)return;
    }
    render(); // show login screen
  }catch(e){
    console.error('init error',e);
    const ca=document.getElementById('content-area');
    if(ca)ca.innerHTML='<div style="padding:30px;color:#c44">系統啟動失敗：'+e.message+'</div>';
  }
}
init();

</script>
